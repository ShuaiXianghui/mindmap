<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Mind Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir@5.11.2/dist/MindElixir.css">
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --border: #e5e5e7;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --sidebar-width: 240px;
  --toolbar-height: 48px;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --transition: 0.2s ease;
}

[data-theme="dark"] {
  --bg: #1c1c1e;
  --surface: #2c2c2e;
  --border: #3a3a3c;
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --accent: #0a84ff;
  --accent-hover: #409cff;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background var(--transition), color var(--transition);
}

/* Toolbar */
.toolbar {
  height: var(--toolbar-height);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 4px;
  z-index: 100;
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
  -webkit-app-region: drag;
}

.toolbar .logo {
  font-weight: 700;
  font-size: 15px;
  margin-right: 16px;
  letter-spacing: -0.2px;
  -webkit-app-region: no-drag;
}

.toolbar .sep {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 8px;
  transition: background var(--transition);
}

.toolbar button, .tool-btn {
  -webkit-app-region: no-drag;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 30px;
  padding: 0 10px;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--transition), color var(--transition);
  font-family: inherit;
}

.toolbar button:hover, .tool-btn:hover {
  background: rgba(0,0,0,.06);
}
[data-theme="dark"] .toolbar button:hover,
[data-theme="dark"] .tool-btn:hover {
  background: rgba(255,255,255,.08);
}

.toolbar button svg {
  width: 16px;
  height: 16px;
}

/* Main layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: background var(--transition), border-color var(--transition);
}

.sidebar-header {
  padding: 14px 16px 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sidebar-header button {
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--accent);
  font-size: 18px;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: inherit;
}
.sidebar-header button:hover { background: rgba(0,0,0,.06); }
[data-theme="dark"] .sidebar-header button:hover { background: rgba(255,255,255,.08); }

.map-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
}

.map-item {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  gap: 8px;
  transition: background var(--transition);
  position: relative;
  margin-bottom: 2px;
}

.map-item:hover { background: rgba(0,0,0,.04); }
[data-theme="dark"] .map-item:hover { background: rgba(255,255,255,.04); }

.map-item.active {
  background: rgba(0,113,227,.08);
  color: var(--accent);
}
[data-theme="dark"] .map-item.active {
  background: rgba(10,132,255,.15);
}

.map-item .map-icon {
  font-size: 16px;
  flex-shrink: 0;
}

.map-item .map-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.map-name-input {
  flex: 1;
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  outline: none;
  min-width: 0;
}

.map-item .map-delete {
  opacity: 0;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  padding: 2px 4px;
  border-radius: 4px;
  font-family: inherit;
  transition: opacity var(--transition), color var(--transition);
}
.map-item:hover .map-delete { opacity: 1; }
.map-item .map-delete:hover { color: #ff3b30; }

/* Map area */
.map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  transition: background var(--transition);
}

.map-container .map-elixir-container {
  width: 100%;
  height: 100%;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-secondary);
  gap: 12px;
}

.empty-state .empty-icon { font-size: 48px; }
.empty-state .empty-text { font-size: 15px; }
.empty-state button {
  margin-top: 8px;
  padding: 8px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.empty-state button:hover { background: var(--accent-hover); }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.15s ease;
}

.modal {
  background: var(--surface);
  border-radius: 12px;
  padding: 24px;
  width: 400px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  transition: background var(--transition);
}

.modal h3 {
  font-size: 16px;
  margin-bottom: 16px;
  font-weight: 600;
}

.modal input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}
.modal input:focus { border-color: var(--accent); }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
}

.modal-actions button {
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: background var(--transition);
}
.modal-actions button:hover { background: var(--bg); }
.modal-actions button.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.modal-actions button.primary:hover { background: var(--accent-hover); }

/* Shortcuts panel */
.shortcuts-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  z-index: 1000;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  min-width: 340px;
  transition: background var(--transition);
}

.shortcuts-panel h3 {
  font-size: 16px;
  margin-bottom: 16px;
  font-weight: 600;
}

.shortcuts-panel .shortcut-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
}

.shortcuts-panel .shortcut-key {
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", monospace;
  border: 1px solid var(--border);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #1d1d1f;
  color: #fff;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 2000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  pointer-events: none;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* Hidden */
.hidden { display: none !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* File input hidden */
#import-input { display: none; }
</style>

let LANG = (function() {
  // Restore saved language or detect from browser
  var saved = (function() {
    try { var s = JSON.parse(localStorage.getItem('mindmap_app')); return s && s.lang; } catch(e) { return null; }
  })();
  if (saved) return saved;
  var navLang = (navigator.language || '').toLowerCase();
  return navLang.startsWith('zh') ? 'zh' : 'en';
})();

function t(key) {
  return (I18N[LANG] && I18N[LANG][key]) || (I18N.en[key]) || key;
}

function setLang(lang) {
  LANG = lang;
  try {
    var s = JSON.parse(localStorage.getItem('mindmap_app') || '{}');
    s.lang = lang;
    localStorage.setItem('mindmap_app', JSON.stringify(s));
  } catch(e) {}
  // Refresh to apply
  location.reload();
}

function applyI18n() {
  document.title = t('title');
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (key) el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-title');
    if (key) el.title = t(key);
  });
}

<script>
const App = (() => {
  const STORAGE_KEY = 'mindmap_app';
  const MAP_PREFIX = 'mindmap_data_';

  let mei = null;
  let state = { maps: [], currentMapId: null, theme: 'light' };
  let saveTimer = null;

  // ===== Storage =====
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state = JSON.parse(raw);
    } catch (e) { /* ignore */ }
    if (!state.maps) state.maps = [];
    if (!state.theme) state.theme = 'light';
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function loadMapData(id) {
    try {
      const raw = localStorage.getItem(MAP_PREFIX + id);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  function saveMapData(id, data) {
    localStorage.setItem(MAP_PREFIX + id, JSON.stringify(data));
  }

  function deleteMapData(id) {
    localStorage.removeItem(MAP_PREFIX + id);
  }

  // ===== Toast =====
  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2100);
  }

  // ===== Mind Elixir init =====
  // MindElixir IIFE puts constructor at .default, ESM imports directly
  // MindElixir.new() returns { nodeData: {...} } — ALWAYS wrapped
  const ME = () => typeof MindElixir === 'function' ? MindElixir : MindElixir.default;
  const meNew = (topic) => {
    const fn = MindElixir.new || (MindElixir.default && MindElixir.default.new);
    if (fn) return fn(topic); // returns { nodeData: {...} }
    return { nodeData: { topic, id: 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8), children: [] } };
  };

  function initMindElixir(data) {
    // data must be { nodeData: {...} } format
    if (mei) return;
    mei = new (ME())({
      el: '#map',
      direction: MindElixir.SIDE ?? 2,
    });
    mei.init(data);
    mei.bus.addListener('operation', () => {
      autoSave();
    });
  }

  function loadMindMap(id) {
    let data = loadMapData(id);
    // Fix old double-wrapped data: { nodeData: { nodeData: {...} } }
    if (data && data.nodeData && data.nodeData.nodeData) {
      data = data.nodeData;
    }
    // Ensure data is wrapped: { nodeData: {...} }
    const wrapped = (data && data.nodeData) ? data : meNew(t('centralTopic'));
    if (!mei) {
      initMindElixir(wrapped);
    } else {
      mei.refresh(wrapped);
    }
  }

  // Normalize data to { nodeData: {...} } storage format
  function wrapData(raw) {
    if (!raw) return null;
    return raw.nodeData ? raw : { nodeData: raw };
  }

  // ===== Auto-save (debounced) =====
  function autoSave() {
    if (!state.currentMapId) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      if (!mei || !state.currentMapId) return;
      const data = wrapData(mei.getData());
      if (data) { saveMapData(state.currentMapId, data); updateMapTimestamp(state.currentMapId); }
    }, 500);
  }

  function saveCurrentMap() {
    if (!mei || !state.currentMapId) return;
    clearTimeout(saveTimer);
    const data = wrapData(mei.getData());
    if (data) { saveMapData(state.currentMapId, data); updateMapTimestamp(state.currentMapId); }
    toast(t('saved'));
  }

  function updateMapTimestamp(id) {
    const map = state.maps.find(m => m.id === id);
    if (map) {
      map.updatedAt = Date.now();
      saveState();
      renderMapList();
    }
  }

  // ===== Map management =====
  function createMap(name) {
    const mapName = name || t('untitledMap');
    const id = 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const nd = meNew(mapName); // Already { nodeData: {...} } format
    saveMapData(id, nd);
    state.maps.unshift({ id, name: mapName, createdAt: Date.now(), updatedAt: Date.now() });
    saveState();
    switchMap(id);
    renderMapList();
    toast(t('mapCreated'));
  }

  function switchMap(id) {
    // Save current first
    if (state.currentMapId && mei) {
      const data = wrapData(mei.getData());
      if (data) saveMapData(state.currentMapId, data);
    }
    state.currentMapId = id;
    saveState();
    loadMindMap(id);
    renderMapList();
    document.querySelector('.map-container').classList.remove('hidden');
  }

  function deleteMap(id) {
    if (state.maps.length <= 1) {
      toast(t('keepOne'));
      return;
    }
    deleteMapData(id);
    state.maps = state.maps.filter(m => m.id !== id);
    if (state.currentMapId === id) {
      state.currentMapId = state.maps[0]?.id || null;
    }
    saveState();
    renderMapList();
    if (state.currentMapId) {
      loadMindMap(state.currentMapId);
    }
    toast(t('mapDeleted'));
  }

  function renameMap(id, newName) {
    const map = state.maps.find(m => m.id === id);
    if (map) {
      map.name = newName;
      saveState();
      renderMapList();
    }
  }

  function startRename(id) {
    const map = state.maps.find(m => m.id === id);
    if (!map) return;
    const nameSpan = document.querySelector(`.map-item[data-id="${id}"] .map-name`);
    if (!nameSpan) return;

    const input = document.createElement('input');
    input.value = map.name;
    input.className = 'map-name-input';

    const finish = () => {
      const newName = input.value.trim();
      if (newName && newName !== map.name) {
        renameMap(id, newName);
      } else {
        renderMapList();
      }
    };

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); finish(); }
      if (e.key === 'Escape') { input.value = map.name; finish(); }
    });
    input.addEventListener('blur', finish);

    nameSpan.replaceWith(input);
    input.focus();
    input.select();
  }

  // ===== Export =====
  function exportJSON() {
    if (!state.currentMapId) return;
    const data = loadMapData(state.currentMapId);
    if (!data) return;
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    downloadBlob(blob, 'mindmap.json');
    toast(t('jsonExported'));
  }

  async function exportPNG() {
    if (!mei) return;
    try {
      const el = document.querySelector('#map');
      if (!el) {
        toast(t('noContainer'));
        return;
      }
      const canvas = await html2canvas(el, {
        backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#f5f5f7',
        scale: 2,
        useCORS: true,
      });
      canvas.toBlob(blob => {
        downloadBlob(blob, 'mindmap.png');
        toast(t('pngExported'));
      });
    } catch (e) {
      toast(t('pngFail') + e.message);
    }
  }

  // Convert generic JSON tree to Mind Elixir node data format
  function normalizeNode(node, idCounter) {
    if (!node || typeof node !== 'object') return null;
    if (Array.isArray(node)) return null;
    const c = idCounter || { v: 0 };
    const n = {
      topic: (node.topic || node.name || node.title || node.text || t('untitled')).toString(),
      id: node.id || ('n_' + Date.now() + '_' + (c.v++)),
      expanded: node.expanded !== false,
    };
    if (node.direction !== undefined && node.direction !== null) {
      n.direction = node.direction;
    }
    if (node.children && Array.isArray(node.children)) {
      const kids = [];
      for (const child of node.children) {
        const kid = normalizeNode(child, c);
        if (kid) kids.push(kid);
      }
      n.children = kids;
    }
    return n;
  }

  // Normalize raw parsed JSON and import as a new map. Returns id.
  function parseAndImport(raw, source) {
    console.log('[import] JSON parsed, keys:', Object.keys(raw).join(', '));

    let nodeData;
    const idCounter = { v: 0 };

    function tryExtract(obj) {
      if (obj.nodeData) return obj.nodeData;
      if (obj.topic || obj.name || obj.title || obj.text) return normalizeNode(obj, idCounter);
      if (obj.nodes && Array.isArray(obj.nodes) && obj.nodes.length > 0) {
        console.log('[import] Format: nodes array, using nodes[0]');
        return normalizeNode(obj.nodes[0], idCounter);
      }
      if (obj.root && typeof obj.root === 'object') {
        console.log('[import] Format: root wrapper');
        return normalizeNode(obj.root, idCounter);
      }
      if (obj.data && typeof obj.data === 'object' && !Array.isArray(obj.data)) {
        console.log('[import] Format: data wrapper');
        return tryExtract(obj.data);
      }
      var altKey = obj.mindmap || obj.mindMap || obj.map;
      if (altKey && typeof altKey === 'object') {
        console.log('[import] Format: map wrapper');
        return normalizeNode(altKey, idCounter);
      }
      return null;
    }

    nodeData = tryExtract(raw);

    if (!nodeData && Array.isArray(raw)) {
      nodeData = { topic: t('importedFromArray'), id: 'nr_' + Date.now(), expanded: true, children: [] };
      for (var i = 0; i < raw.length; i++) {
        var kid = normalizeNode(raw[i], idCounter);
        if (kid) nodeData.children.push(kid);
      }
      console.log('[import] Format: array, items=' + raw.length);
    }

    if (!nodeData || !nodeData.topic) {
      throw new Error(source === 'auto' ? t('unrecognizedData') : t('unrecognizedFile'));
    }
    console.log('[import] Normalized OK, topic=', nodeData.topic);

    var data = { nodeData: nodeData };
    var name = nodeData.topic;
    var id = 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);

    saveMapData(id, data);
    console.log('[import] Saved to localStorage key=', MAP_PREFIX + id);

    state.maps.unshift({ id: id, name: name, createdAt: Date.now(), updatedAt: Date.now() });
    saveState();
    console.log('[import] State updated, maps count=', state.maps.length);

    switchMap(id);
    console.log('[import] switchMap done');

    renderMapList();
    return id;
  }

  // Auto-import from server-side data file (CLI mode)
  function autoImport() {
    fetch('./auto-load.json')
      .then(function(res) {
        if (!res.ok) { console.log('[auto-import] No auto-load.json found, skip'); return; }
        return res.json();
      })
      .then(function(raw) {
        if (!raw) return;
        console.log('[auto-import] Loaded auto-load.json');
        parseAndImport(raw, 'auto');
        toast(t('autoImported'));
      })
      .catch(function(e) {
        console.log('[auto-import]', e.message);
      });
  }

  function importJSON(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onerror = function() { toast(t('fileReadFail')); };
    reader.onload = function() {
      try {
        var raw = JSON.parse(reader.result);
        parseAndImport(raw, 'file');
        toast(t('importedMap'));
      } catch (e) {
        console.error('[import] ERROR:', e.message, e.stack);
        toast(t('importFail') + (e.message || t('unknownError')));
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // ===== Theme =====
  function toggleTheme() {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    saveState();
    applyTheme();
  }

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', state.theme);
    const btn = document.getElementById('theme-btn');
    if (state.theme === 'dark') {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    } else {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    }
    if (mei) {
      const theme = state.theme === 'dark' ? MindElixir.DARK_THEME : MindElixir.THEME;
      mei.changeTheme(theme);
    }
  }

  // ===== Shortcuts =====
  function toggleShortcuts() {
    document.getElementById('shortcuts-panel').classList.toggle('hidden');
  }

  // ===== Sidebar rendering =====
  function renderMapList() {
    const list = document.getElementById('map-list');
    list.innerHTML = state.maps.map(m => `
      <div class="map-item${m.id === state.currentMapId ? ' active' : ''}" data-id="${m.id}" onclick="App.switchMap('${m.id}')">
        <span class="map-icon">📄</span>
        <span class="map-name" ondblclick="event.stopPropagation(); App.startRename('${m.id}')" data-i18n-title="rename">${escapeHtml(m.name)}</span>
        <button class="map-delete" onclick="event.stopPropagation(); App.deleteMap('${m.id}')" data-i18n-title="delete">×</button>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ===== Helpers =====
  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function downloadDataUrl(dataUrl, filename) {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    a.click();
  }

  // ===== Init =====
  function init() {
    loadState();
    applyTheme();
    applyI18n();
    renderMapList();

    if (state.maps.length === 0) {
      // First time: create a default map
      createMap(t('defaultMap'));
    } else {
      const currentId = state.currentMapId || state.maps[0].id;
      switchMap(currentId);
    }

    // CLI mode: auto-import from server
    autoImport();

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Ctrl+S: save
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveCurrentMap();
      }
      // Escape: close panels
      if (e.key === 'Escape') {
        document.getElementById('shortcuts-panel').classList.add('hidden');
      }
    });

    // Close shortcuts panel on outside click
    document.addEventListener('click', e => {
      const panel = document.getElementById('shortcuts-panel');
      if (!panel.classList.contains('hidden') &&
          !panel.contains(e.target) &&
          !e.target.closest('[onclick*="toggleShortcuts"]')) {
        panel.classList.add('hidden');
      }
    });
  }

  // Public API
  return {
    init,
    createMap,
    switchMap,
    deleteMap,
    renameMap,
    startRename,
    saveCurrentMap,
    exportJSON,
    exportPNG,
    importJSON,
    toggleTheme,
    toggleShortcuts,
  };
})();

document.addEventListener('DOMContentLoaded', () => {
  if (typeof MindElixir === 'undefined') {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#86868b;"><p>' + t('loadError') + '</p></div>';
    return;
  }
  App.init();
});
</script>
</body>
